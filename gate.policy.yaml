conditions:
  spec_exists:
    required: true
    description: "Task spec file exists in the worktree"

  spec_approved:
    required: true
    description: "Spec has been approved by a reviewer"

  within_boundaries:
    required: true
    description: "Changes stay within the declared scope boundary"

  builder:
    required: true
    description: "Builder agent completed successfully"

  verification:
    required: true
    description: "All verification commands (lint, typecheck, test, build) passed"

  review:
    required: true
    description: "Code review verdict is pass"

  preview:
    required: false
    description: "Preview environment check passed (only when preview_required)"

  human_acceptance:
    required: true
    description: "A human has explicitly accepted the change"

  findings:
    required: false
    description: "No unresolved blocking findings"

  compliance:
    required: false
    description: "All compliance contracts pass (no error-level violations)"

auto_merge: false

# Subset of conditions required before auto-merge triggers.
# When omitted, ALL required conditions must pass.
auto_merge_conditions:
  - builder
  - verification
  - review
  - findings

# Named profiles override the base policy for specific contexts.
profiles:
  daemon:
    disable:
      - human_acceptance
    auto_merge: true

  ci:
    enable:
      - findings
    disable:
      - human_acceptance
      - preview
    auto_merge: false

  strict:
    enable:
      - preview
      - findings
      - compliance
    auto_merge: false

  hotfix:
    disable:
      - human_acceptance
      - compliance
      - findings
      - spec_exists
      - spec_approved
      - within_boundaries
    auto_merge: true
