[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "spec-orch"
version = "0.1.0"
description = "SpecOrch MVP prototype"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "typer>=0.24,<0.25",
]

[project.optional-dependencies]
dev = [
  "pytest>=9,<10",
]

[project.scripts]
spec-orch = "spec_orch.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
