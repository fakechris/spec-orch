[linear]
token_env = "SPEC_ORCH_LINEAR_TOKEN"
team_key = "SON"
poll_interval_seconds = 60
issue_filter = "assigned_to_me"

[builder]
adapter = "codex_exec"
codex_executable = "codex"

[planner]
model = "MiniMax-M2.5"
api_type = "anthropic"
api_key_env = "SPEC_ORCH_LLM_API_KEY"
api_base_env = "SPEC_ORCH_LLM_API_BASE"

[daemon]
max_concurrent = 1
lockfile_dir = ".spec_orch_locks/"

[conversation]
default_channel = "cli"

[conversation.slack]
bot_token_env = "SLACK_BOT_TOKEN"
app_token_env = "SLACK_APP_TOKEN"

[conversation.linear]
watch_label = "spec-orch"
poll_interval_seconds = 30
