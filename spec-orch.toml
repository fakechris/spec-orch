[issue]
source = "linear"

[linear]
token_env = "SPEC_ORCH_LINEAR_TOKEN"
team_key = "SON"
poll_interval_seconds = 60
issue_filter = "assigned_to_me"

[verification]
lint = ["{python}", "-m", "ruff", "check", "src/"]
typecheck = ["{python}", "-m", "mypy", "src/"]
test = ["{python}", "-m", "pytest", "-q"]
build = ["{python}", "-c", "print('build ok')"]

[builder]
adapter = "acpx"
agent = "opencode"
model = "minimax/MiniMax-M2.5"
timeout_seconds = 1800

[reviewer]
adapter = "local"
# --- To use LLM-driven review with MiniMax (OpenAI-compat mode): ---
# adapter = "llm"
# model = "openai/MiniMax-M2.5"
# api_key_env = "SPEC_ORCH_LLM_API_KEY"
# api_base_env = "SPEC_ORCH_LLM_API_BASE_OPENAI"

[planner]
model = "MiniMax-M2.5"
api_type = "anthropic"
api_key_env = "SPEC_ORCH_LLM_API_KEY"
api_base_env = "SPEC_ORCH_LLM_API_BASE"

[daemon]
max_concurrent = 1
lockfile_dir = ".spec_orch_locks/"
consume_state = "Ready"
require_labels = []
exclude_labels = ["blocked", "needs-clarification"]
skip_parents = true

[evolution]
enabled = true
trigger_after_n_runs = 5
auto_promote = false

[evolution.prompt_evolver]
enabled = true

[evolution.plan_strategy_evolver]
enabled = true

[evolution.harness_synthesizer]
enabled = true
dry_run = true

[evolution.policy_distiller]
enabled = false

[evolution.policies.prompt_evolver]
min_runs = 5
trigger_on = "pass_rate_drop"
threshold = 0.1

[evolution.policies.harness_synthesizer]
min_runs = 10
trigger_on = "new_failure_pattern"

[evolution.policies.policy_distiller]
min_runs = 10
trigger_on = "trajectory_available"

[evolution.policies.plan_strategy_evolver]
min_runs = 5
trigger_on = "deviation_spike"
threshold = 0.1

[conversation]
default_channel = "cli"

[conversation.slack]
bot_token_env = "SLACK_BOT_TOKEN"
app_token_env = "SLACK_APP_TOKEN"

[conversation.linear]
watch_label = "spec-orch"
poll_interval_seconds = 30
